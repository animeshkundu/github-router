<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Same-origin embedded frame</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 16px;
           background: #f2f7fd; color: #1a1a1a; }
    .marker { font-size: 20px; font-weight: 700; letter-spacing: 0.5px;
              padding: 12px; border: 2px solid #2471a3; border-radius: 8px;
              background: #fff; display: inline-block; }
    .note { margin-top: 12px; color: #555; font-size: 13px; }
  </style>
</head>
<body>
  <h2>Same-origin frame</h2>
  <p>This document is served from the <strong>same origin</strong> (the base port)
     as the page that embeds it.</p>
  <p>The same-origin marker is:</p>
  <div id="same-origin-marker" class="marker" data-role="same-origin-marker">SOM_b4e2c8</div>
  <p class="note">Report this value verbatim.</p>
</body>
</html>
